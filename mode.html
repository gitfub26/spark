<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4b5364">
    <title>Spark Tracker</title>
    <link id="manifest-link" rel="manifest" href="">
    <style>
        :root {
            /* Base Colors */
            --bg-color: #4b5364; 
            --text-color: #f4f4f4;
            --border-color: rgba(255, 255, 255, 0.15);
            --element-bg: rgba(255, 255, 255, 0.05);
            
            /* Static Theme Color (Walmart Blue) */
            --theme-color: #0071ce; 
            
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Header & Logo */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 0 10px 0;
        }

        /* Grid Typography */
        h2 {
            margin: 0 0 12px 0;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Bubbles */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
            gap: 12px;
        }

        .bubble {
            width: 42px;
            height: 42px;
            border: 1.5px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--element-bg);
            color: var(--text-color);
        }

        /* Categories */
        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .pill {
            padding: 14px 20px;
            border: 1.5px solid var(--border-color);
            border-radius: 25px;
            background: var(--element-bg);
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            color: var(--text-color);
        }

        /* Reset Button */
        .reset-container {
            display: flex;
            justify-content: center;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .reset {
            width: 60%;
            border: 1.5px dashed var(--border-color);
            background: transparent;
        }

        /* Selection States */
        .selected {
            background-color: var(--theme-color);
            border-color: var(--theme-color);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transform: scale(1.05);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <svg viewBox="0 0 100 100" width="60" height="60" xmlns="http://www.w3.org/2000/svg">
                <g fill="#FFC220">
                    <rect x="43" y="10" width="14" height="24" rx="7" />
                    <rect x="43" y="66" width="14" height="24" rx="7" />
                    <rect x="43" y="10" width="14" height="24" rx="7" transform="rotate(60 50 50)" />
                    <rect x="43" y="66" width="14" height="24" rx="7" transform="rotate(60 50 50)" />
                    <rect x="43" y="10" width="14" height="24" rx="7" transform="rotate(-60 50 50)" />
                    <rect x="43" y="66" width="14" height="24" rx="7" transform="rotate(-60 50 50)" />
                </g>
            </svg>
        </div>

        <div>
            <h2>A</h2>
            <div class="grid" id="grid-a"></div>
        </div>

        <div class="category-grid" id="categories">
            <div class="pill" data-id="cat-produce">Produce</div>
            <div class="pill" data-id="cat-meat">Meat</div>
            <div class="pill" data-id="cat-dairy">Dairy</div>
            <div class="pill" data-id="cat-cheese">Cheese</div>
        </div>

        <div>
            <h2>G</h2>
            <div class="grid" id="grid-g"></div>
        </div>

        <div class="reset-container">
            <div class="pill reset" id="reset-btn">Reset</div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gridA = document.getElementById('grid-a');
            const gridG = document.getElementById('grid-g');
            const resetBtn = document.getElementById('reset-btn');
            
            // Format numbers with leading zeros
            const formatNum = (num) => num.toString().padStart(2, '0');

            // Generator function for numerical bubbles
            const generateBubbles = (container, prefix, count) => {
                for (let i = 1; i <= count; i++) {
                    const el = document.createElement('div');
                    el.className = 'bubble';
                    el.textContent = formatNum(i);
                    el.dataset.id = `${prefix}-${i}`;
                    container.appendChild(el);
                }
            };

            generateBubbles(gridA, 'a', 32);
            generateBubbles(gridG, 'g', 29);

            const interactables = document.querySelectorAll('.bubble, .pill:not(.reset)');

            // State Management via LocalStorage
            const loadState = () => {
                const state = JSON.parse(localStorage.getItem('sparkTrackerState')) || {};
                interactables.forEach(el => {
                    if (state[el.dataset.id]) {
                        el.classList.add('selected');
                    }
                });
            };

            const saveState = () => {
                const state = {};
                interactables.forEach(el => {
                    if (el.classList.contains('selected')) {
                        state[el.dataset.id] = true;
                    }
                });
                localStorage.setItem('sparkTrackerState', JSON.stringify(state));
            };

            // Event Listeners for Interaction
            interactables.forEach(el => {
                el.addEventListener('click', () => {
                    el.classList.toggle('selected');
                    saveState();
                });
            });

            resetBtn.addEventListener('click', () => {
                interactables.forEach(el => el.classList.remove('selected'));
                localStorage.removeItem('sparkTrackerState');
            });

            loadState();
            initPWA();
        });

        // PWA Setup: Dynamic Manifest & Service Worker
        function initPWA() {
            const manifest = {
                name: "Spark Tracker",
                short_name: "Tracker",
                display: "standalone",
                background_color: "#4b5364",
                theme_color: "#4b5364",
                start_url: window.location.href,
                icons: [{
                    src: "data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100' height='100' fill='%234b5364'/%3E%3Cg fill='%23FFC220'%3E%3Crect x='43' y='10' width='14' height='24' rx='7'/%3E%3Crect x='43' y='66' width='14' height='24' rx='7'/%3E%3Crect x='43' y='10' width='14' height='24' rx='7' transform='rotate(60 50 50)'/%3E%3Crect x='43' y='66' width='14' height='24' rx='7' transform='rotate(60 50 50)'/%3E%3Crect x='43' y='10' width='14' height='24' rx='7' transform='rotate(-60 50 50)'/%3E%3Crect x='43' y='66' width='14' height='24' rx='7' transform='rotate(-60 50 50)'/%3E%3C/g%3E%3C/svg%3E",
                    sizes: "any",
                    type: "image/svg+xml"
                }]
            };
            
            const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
            document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

            if ('serviceWorker' in navigator) {
                const swCode = `
                    const CACHE_NAME = 'spark-tracker-v3';
                    self.addEventListener('install', event => {
                        event.waitUntil(
                            caches.open(CACHE_NAME).then(cache => cache.addAll([location.href]))
                        );
                        self.skipWaiting();
                    });
                    
                    self.addEventListener('fetch', event => {
                        event.respondWith(
                            caches.match(event.request).then(response => {
                                return response || fetch(event.request);
                            }).catch(() => {
                                return caches.match(location.href);
                            })
                        );
                    });
                `;
                
                const swBlob = new Blob([swCode], {type: 'application/javascript'});
                const swUrl = URL.createObjectURL(swBlob);
                
                navigator.serviceWorker.register(swUrl).catch(err => console.error('SW registration failed.', err));
            }
        }
    </script>
</body>
</html>
