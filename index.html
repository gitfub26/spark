<link rel="manifest" href="#" id="manifest-link">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f7f8fa;
    --border: #e2e6ec;
    --text: #0d1117;
    --text2: #5a6478;
    --accent: #0071CE;
    --accent2: #FFC220;
    --check-bg: #e8f4ff;
    --check-done: #0071CE;
    --done-text: #0071CE;
    --done-bg: #e8f4ff;
    --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.06);
    --radius: 14px;
    --header-h: 64px;
    --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
  }

  [data-theme="dark"] {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2230;
    --border: #2a3245;
    --text: #e6edf3;
    --text2: #7d8fa8;
    --accent: #3b9eff;
    --accent2: #FFC220;
    --check-bg: #1a2636;
    --check-done: #3b9eff;
    --done-text: #3b9eff;
    --done-bg: #1a2636;
    --shadow: 0 1px 4px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overscroll-behavior: none;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  .logo {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 6px rgba(0,0,0,0.18);
  }
  .logo img { width: 38px; height: 38px; object-fit: cover; border-radius: 10px; display: block; }

  .header-title {
    flex: 1;
  }
  .header-title h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.1;
    color: var(--text);
  }
  .header-title p {
    font-size: 12px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    margin-top: 1px;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background var(--transition), color var(--transition), border-color var(--transition);
  }
  .btn-icon:active { transform: scale(0.92); }
  .btn-icon:hover { background: var(--border); color: var(--text); }

  .btn-reset {
    height: 38px;
    padding: 0 14px;
    border-radius: 10px;
    border: 1.5px solid #ff4d4d33;
    background: #ff4d4d11;
    color: #e03a3a;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: background var(--transition), transform var(--transition);
  }
  .btn-reset:active { transform: scale(0.92); background: #ff4d4d22; }
  [data-theme="dark"] .btn-reset { color: #ff6b6b; border-color: #ff6b6b33; background: #ff6b6b11; }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    background: var(--surface);
    padding: 10px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .progress-label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .progress-count { font-size: 13px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }
  .progress-bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  /* ── MAIN CONTENT ── */
  main {
    padding: 14px 12px 90px;
    max-width: 540px;
    margin: 0 auto;
  }

  /* ── SECTION ── */
  .section {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    overflow: hidden;
    transition: box-shadow var(--transition);
  }

  .section-header {
    display: flex;
    align-items: center;
    padding: 13px 14px;
    cursor: pointer;
    user-select: none;
    gap: 10px;
    transition: background var(--transition);
  }
  .section-header:active { background: var(--surface2); }

  .section-icon {
    width: 32px;
    height: 32px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .icon-dept { background: #fff3cd; }
  [data-theme="dark"] .icon-dept { background: #2a2210; }
  .icon-a    { background: #dbeafe; }
  [data-theme="dark"] .icon-a    { background: #0f1f3d; }
  .icon-j    { background: #dcfce7; }
  [data-theme="dark"] .icon-j    { background: #0d2318; }
  .icon-g    { background: #fce7f3; }
  [data-theme="dark"] .icon-g    { background: #2d0f20; }

  .section-label {
    flex: 1;
  }
  .section-label strong {
    display: block;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.2px;
  }
  .section-label span {
    font-size: 11.5px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
  }

  .section-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 99px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    transition: background var(--transition), color var(--transition);
    white-space: nowrap;
  }
  .section-badge.all-done {
    background: var(--done-bg);
    color: var(--done-text);
    border-color: transparent;
  }

  .chevron {
    color: var(--text2);
    transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
    flex-shrink: 0;
  }
  .section.open .chevron { transform: rotate(180deg); }

  /* ── SECTION BODY ── */
  .section-body {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  .section.open .section-body { grid-template-rows: 1fr; }
  .section-body-inner {
    overflow: hidden;
  }

  /* ── AISLE GRID ── */
  .aisle-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 7px;
    padding: 0 12px 14px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  .aisle-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 10px 6px 9px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: border-color var(--transition), background var(--transition), transform 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .aisle-item:active { transform: scale(0.93); }

  .aisle-item.done {
    border-color: var(--check-done);
    background: var(--check-bg);
  }

  .check-circle {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color var(--transition), background var(--transition);
    flex-shrink: 0;
  }
  .aisle-item.done .check-circle {
    border-color: var(--check-done);
    background: var(--check-done);
  }
  .check-circle svg {
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.15s, transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
  }
  .aisle-item.done .check-circle svg {
    opacity: 1;
    transform: scale(1);
  }

  .aisle-name {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    letter-spacing: 0.3px;
    transition: color var(--transition);
  }
  .aisle-item.done .aisle-name { color: var(--check-done); font-weight: 600; }

  /* ── DEPT ITEMS (larger) ── */
  .dept-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 12px 12px 14px;
    border-top: 1px solid var(--border);
  }
  .dept-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 14px 8px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: border-color var(--transition), background var(--transition), transform 0.12s;
  }
  .dept-item:active { transform: scale(0.93); }
  .dept-item.done {
    border-color: var(--check-done);
    background: var(--check-bg);
  }
  .dept-emoji { font-size: 24px; line-height: 1; }
  .dept-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-align: center;
    transition: color var(--transition);
  }
  .dept-item.done .dept-label { color: var(--check-done); }
  .dept-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color var(--transition), background var(--transition);
  }
  .dept-item.done .dept-check {
    border-color: var(--check-done);
    background: var(--check-done);
  }
  .dept-check svg { opacity: 0; transform: scale(0.5); transition: opacity 0.15s, transform 0.15s cubic-bezier(0.34,1.56,0.64,1); }
  .dept-item.done .dept-check svg { opacity: 1; transform: scale(1); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1a2e;
    color: #fff;
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    opacity: 0;
    z-index: 999;
    white-space: nowrap;
    pointer-events: none;
  }
  [data-theme="dark"] .toast { background: #e6edf3; color: #0d1117; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>

<div class="progress-wrap">

    <span class="progress-label">Overall Progress</span>
    <span class="progress-count" id="prog-count">0 / 0</span>
  </div>
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="prog-bar"></div>
  </div>
</div>

<main id="main-content"></main>

<div class="toast" id="toast"></div>

<script>
// ── DATA STRUCTURE ──
const SECTIONS = [
  {
    id: 'dept',
    label: 'Departments',
    sub: 'Meat · Dairy · Produce',
    icon: '🛒',
    iconClass: 'icon-dept',
    type: 'dept',
    items: [
      { id: 'meat',    label: 'Meat',    emoji: '🥩' },
      { id: 'dairy',   label: 'Dairy',   emoji: '🧀' },
      { id: 'produce', label: 'Produce', emoji: '🥦' },
    ]
  },
  {
    id: 'aisle-a',
    label: 'Aisle A',
    sub: 'A01 – A31',
    icon: '🅰️',
    iconClass: 'icon-a',
    type: 'aisle',
    prefix: 'A',
    start: 1, end: 31
  },
  {
    id: 'aisle-j',
    label: 'Aisle J',
    sub: 'J01 – J26',
    icon: '🇯',
    iconClass: 'icon-j',
    type: 'aisle',
    prefix: 'J',
    start: 1, end: 26
  },
  {
    id: 'aisle-g',
    label: 'Aisle G',
    sub: 'G01 – G31',
    icon: '🇬',
    iconClass: 'icon-g',
    type: 'aisle',
    prefix: 'G',
    start: 1, end: 31
  }
];

// ── STATE ──
let state = {};
let openSections = {};

function loadState() {
  try {
    const saved = localStorage.getItem('sparktracker_v2');
    if (saved) {
      const parsed = JSON.parse(saved);
      state = parsed.state || {};
      openSections = parsed.openSections || {};
    }
  } catch(e) { state = {}; openSections = {}; }
}

function saveState() {
  localStorage.setItem('sparktracker_v2', JSON.stringify({ state, openSections }));
}

function getKey(sectionId, itemId) { return `${sectionId}__${itemId}`; }

function isChecked(sectionId, itemId) { return !!state[getKey(sectionId, itemId)]; }

function toggle(sectionId, itemId) {
  const key = getKey(sectionId, itemId);
  state[key] = !state[key];
  saveState();
  updateItem(sectionId, itemId);
  updateSection(sectionId);
  updateProgress();
}

function resetAll() {
  state = {};
  saveState();
  renderAll();
  showToast('All aisles reset ✓');
}

// ── RENDER ──
function pad(n) { return String(n).padStart(2, '0'); }

function checkSVG(size=12) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
}

function buildSection(sec) {
  const totalItems = sec.type === 'dept'
    ? sec.items.length
    : (sec.end - sec.start + 1);

  const doneCount = getDoneCount(sec);
  const allDone = doneCount === totalItems;
  const isOpen = !!openSections[sec.id];

  let innerHTML = '';

  if (sec.type === 'dept') {
    innerHTML = `<div class="dept-grid" id="grid-${sec.id}">`;
    for (const item of sec.items) {
      const done = isChecked(sec.id, item.id);
      innerHTML += `
        <div class="dept-item${done?' done':''}" 
             id="item-${sec.id}-${item.id}"
             onclick="toggle('${sec.id}','${item.id}')" role="checkbox" aria-checked="${done}" tabindex="0">
          <div class="dept-emoji">${item.emoji}</div>
          <div class="dept-label">${item.label}</div>
          <div class="dept-check">${checkSVG(10)}</div>
        </div>`;
    }
    innerHTML += `</div>`;
  } else {
    innerHTML = `<div class="aisle-grid" id="grid-${sec.id}">`;
    for (let n = sec.start; n <= sec.end; n++) {
      const itemId = `${sec.prefix}${pad(n)}`;
      const done = isChecked(sec.id, itemId);
      innerHTML += `
        <div class="aisle-item${done?' done':''}"
             id="item-${sec.id}-${itemId}"
             onclick="toggle('${sec.id}','${itemId}')" role="checkbox" aria-checked="${done}" tabindex="0">
          <div class="check-circle">${checkSVG(11)}</div>
          <span class="aisle-name">${itemId}</span>
        </div>`;
    }
    innerHTML += `</div>`;
  }

  return `
  <div class="section${isOpen?' open':''}" id="sec-${sec.id}">
    <div class="section-header" onclick="toggleSection('${sec.id}')" role="button" aria-expanded="${isOpen}">
      <div class="section-icon ${sec.iconClass}">${sec.icon}</div>
      <div class="section-label">
        <strong>${sec.label}</strong>
        <span>${sec.sub}</span>
      </div>
      <div class="section-badge${allDone?' all-done':''}" id="badge-${sec.id}">${doneCount}/${totalItems}</div>
      <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="section-body" id="body-${sec.id}">
      <div class="section-body-inner">${innerHTML}</div>
    </div>
  </div>`;
}

function renderAll() {
  const main = document.getElementById('main-content');
  main.innerHTML = SECTIONS.map(buildSection).join('');
  updateProgress();
}

function getDoneCount(sec) {
  if (sec.type === 'dept') {
    return sec.items.filter(i => isChecked(sec.id, i.id)).length;
  } else {
    let count = 0;
    for (let n = sec.start; n <= sec.end; n++) {
      if (isChecked(sec.id, `${sec.prefix}${pad(n)}`)) count++;
    }
    return count;
  }
}

function getTotalCount(sec) {
  return sec.type === 'dept' ? sec.items.length : (sec.end - sec.start + 1);
}

function updateItem(sectionId, itemId) {
  const el = document.getElementById(`item-${sectionId}-${itemId}`);
  if (!el) return;
  const done = isChecked(sectionId, itemId);
  el.classList.toggle('done', done);
  el.setAttribute('aria-checked', done);
}

function updateSection(sectionId) {
  const sec = SECTIONS.find(s => s.id === sectionId);
  if (!sec) return;
  const done = getDoneCount(sec);
  const total = getTotalCount(sec);
  const badge = document.getElementById(`badge-${sectionId}`);
  if (badge) {
    badge.textContent = `${done}/${total}`;
    badge.classList.toggle('all-done', done === total);
  }
}

function updateProgress() {
  let total = 0, done = 0;
  for (const sec of SECTIONS) {
    total += getTotalCount(sec);
    done += getDoneCount(sec);
  }
  document.getElementById('prog-count').textContent = `${done} / ${total}`;
  document.getElementById('prog-bar').style.width = total > 0 ? `${(done/total)*100}%` : '0%';
}

function toggleSection(id) {
  openSections[id] = !openSections[id];
  saveState();
  const secEl = document.getElementById(`sec-${id}`);
  if (secEl) {
    secEl.classList.toggle('open', !!openSections[id]);
    secEl.querySelector('.section-header').setAttribute('aria-expanded', !!openSections[id]);
  }
}

// ── THEME ──
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('icon-sun').style.display = dark ? 'block' : 'none';
  document.getElementById('icon-moon').style.display = dark ? 'none' : 'block';
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = dark ? '#161b22' : '#0071CE';
  localStorage.setItem('sparktracker_theme', dark ? 'dark' : 'light');
}

function initTheme() {
  const saved = localStorage.getItem('sparktracker_theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved ? saved === 'dark' : prefersDark);
}

document.getElementById('theme-toggle').addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  applyTheme(!isDark);
});

// ── RESET ──
document.getElementById('reset-btn').addEventListener('click', resetAll);

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── DATE ──
function setDate() {
  const now = new Date();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date-display').textContent =
    `${days[now.getDay()]} ${months[now.getMonth()]} ${now.getDate()}`;
}

// ── KEYBOARD SUPPORT ──
document.addEventListener('keydown', e => {
  const el = document.activeElement;
  if ((e.key === ' ' || e.key === 'Enter') && el && el.getAttribute('role') === 'checkbox') {
    e.preventDefault();
    el.click();
  }
});

// ── SERVICE WORKER (inline) ──
const swCode = `
const CACHE = 'spark-v1';
const ASSETS = [location.href];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
});
`;

function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(() => {});
}

// ── INIT ──
loadState();
initTheme();
setDate();
renderAll();
registerSW();
</script>
